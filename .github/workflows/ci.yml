name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Backend build and test
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wahadini_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better coverage analysis

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore backend/WahadiniCryptoQuest.sln

    - name: Build
      run: dotnet build backend/WahadiniCryptoQuest.sln --configuration Release --no-restore

    - name: Run tests with coverage
      run: |
        dotnet test backend/WahadiniCryptoQuest.sln \
          --configuration Release \
          --no-build \
          --verbosity minimal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./backend/TestResults \
          --logger "trx;LogFileName=test-results.trx"
      env:
        ASPNETCORE_ENVIRONMENT: Testing

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: |
        reportgenerator \
          "-reports:backend/TestResults/**/coverage.cobertura.xml" \
          "-targetdir:backend/TestResults/CoverageReport" \
          "-reporttypes:Html;Cobertura;Badges" \
          "-title:WahadiniCryptoQuest Coverage Report"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: backend/TestResults/**/*.trx
        retention-days: 30

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage-report
        path: backend/TestResults/CoverageReport/
        retention-days: 30

    - name: Upload coverage badges
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-badges
        path: backend/TestResults/CoverageReport/badge*.svg
        retention-days: 30

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: romeovs/lcov-reporter-action@v0.3.1
      with:
        lcov-file: backend/TestResults/**/coverage.cobertura.xml
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check coverage threshold
      run: |
        coverage=$(grep -oP 'line-rate="\K[0-9.]+' backend/TestResults/CoverageReport/Cobertura.xml | head -1)
        coverage_percent=$(echo "$coverage * 100" | bc)
        echo "Current coverage: ${coverage_percent}%"
        
        # Warning if coverage is below 40%
        if (( $(echo "$coverage < 0.40" | bc -l) )); then
          echo "::warning::Code coverage is below 40% (${coverage_percent}%)"
        fi

  # Frontend build and test
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend

    - name: Run linter
      run: npm run lint
      working-directory: ./frontend

    - name: Run type check
      run: npm run type-check || true  # TypeScript check
      working-directory: ./frontend

    - name: Run tests
      run: npm test -- --coverage
      working-directory: ./frontend

    - name: Build
      run: npm run build
      working-directory: ./frontend
      env:
        NODE_ENV: production

    - name: Upload frontend build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/
        retention-days: 7

    - name: Upload frontend test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-test-results
        path: frontend/coverage/
        retention-days: 30

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Check for vulnerabilities
      run: |
        echo "Checking for critical vulnerabilities..."
        trivy fs --exit-code 1 --severity CRITICAL .

  # Code quality
  quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for SonarCloud

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    # Uncomment when SonarCloud is configured
    # - name: SonarCloud Scan
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #   run: |
    #     dotnet tool install --global dotnet-sonarscanner
    #     dotnet sonarscanner begin /k:"your-project-key" /o:"your-org" /d:sonar.login="${SONAR_TOKEN}"
    #     dotnet build backend/WahadiniCryptoQuest.sln
    #     dotnet sonarscanner end /d:sonar.login="${SONAR_TOKEN}"

  # Docker build
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: wahadinicryptoquest/api
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}}

    - name: Build and push (on main/develop)
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build only (on PR)
      if: github.event_name == 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: wahadinicryptoquest/api:pr-${{ github.event.pull_request.number }}
        cache-from: type=gha

  # Summary
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, security, quality]
    if: always()
    
    steps:
    - name: Check job results
      run: |
        echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY

    - name: Report overall status
      run: |
        if [[ "${{ needs.backend.result }}" == "success" && "${{ needs.frontend.result }}" == "success" ]]; then
          echo "✅ All critical jobs passed!"
          exit 0
        else
          echo "❌ Some jobs failed"
          exit 1
        fi
