name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-backend-dependencies:
    name: Update Backend Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Check for outdated packages
      run: |
        cd backend
        dotnet list package --outdated --include-prerelease > outdated-packages.txt
        cat outdated-packages.txt

    - name: Update NuGet packages
      run: |
        cd backend
        dotnet outdated --upgrade

    - name: Run tests
      run: |
        dotnet test backend/WahadiniCryptoQuest.sln --configuration Release

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(deps): update backend dependencies'
        branch: deps/backend-updates
        title: '🔄 Update Backend Dependencies'
        body: |
          Automated dependency updates for backend packages.
          
          ## Changes
          - Updated NuGet packages to latest versions
          
          ## Testing
          - ✅ All tests passing
          
          Please review and merge if everything looks good.
        labels: dependencies, backend

  update-frontend-dependencies:
    name: Update Frontend Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Check for outdated packages
      run: |
        cd frontend
        npm outdated || true

    - name: Update dependencies
      run: |
        cd frontend
        npm update
        npm audit fix || true

    - name: Run tests
      run: |
        cd frontend
        npm test

    - name: Build
      run: |
        cd frontend
        npm run build

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(deps): update frontend dependencies'
        branch: deps/frontend-updates
        title: '🔄 Update Frontend Dependencies'
        body: |
          Automated dependency updates for frontend packages.
          
          ## Changes
          - Updated npm packages to latest versions
          - Fixed security vulnerabilities
          
          ## Testing
          - ✅ All tests passing
          - ✅ Build successful
          
          Please review and merge if everything looks good.
        labels: dependencies, frontend

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Backend security audit
      run: |
        dotnet list backend/WahadiniCryptoQuest.sln package --vulnerable --include-transitive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Frontend security audit
      run: |
        cd frontend
        npm audit --audit-level=high

    - name: Report vulnerabilities
      if: failure()
      run: |
        echo "::error::Security vulnerabilities detected. Please review and update dependencies."
